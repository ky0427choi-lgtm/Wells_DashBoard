<body>
    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-bg"></div>
        <div class="login-card">
            <div class="login-logo">?룫</div>
            <h2>Welstory Dashboard</h2>

                <input type="text" id="loginId" placeholder="?깃? ?꾩씠?? autocomplete="off">
                <div class="domain-tag">@samsung.com</div>
            </div>
            <div style="display:flex;align-items:center;justify-content:flex-end;margin:-4px 0 10px;gap:6px">
                <span id="save-id-label" style="font-size:11px;color:var(--dim);font-weight:600"></span>
                <button id="save-id-btn" onclick="toggleSaveId()"

        </div>
    </div>

    <!-- SPLASH -->
    <div id="splash">
        <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:24px;letter-spacing:-.5px">Welstory Dashboard</div>
        <div class="sp-ring"></div>
        <div style="margin-top:20px;font-size:13px;color:var(--dim)">?곗씠?곕? 遺덈윭?ㅻ뒗 以?..</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <header>
            <div class="header-top">
                <div>
                    <h1 id="main-title">Welstory ?ъ뾽???꾪솴</h1>
                    <div id="lastUpdate"></div>
                    <div id="role-badge"></div>
                </div>
                <div class="hdr-btns">
                    <button id="rpt-btn" class="hdr-btn accent" style="display:none" onclick="openReport()">?뱤 由ы룷??/button>
                    <button id="trend-btn" class="hdr-btn" onclick="openTrendReport()" title="異붿씠 遺꾩꽍 由ы룷??>?뱢</button>
                    <button class="hdr-btn" onclick="openCal()" title="?곗씪由??앹닔 ?대엺">?뱟</button>
                    <button class="hdr-btn" onclick="location.reload()">??/button>
                    <button class="hdr-btn" onclick="openPwChange()" title="鍮꾨?踰덊샇 蹂寃?>?뵎</button>
                </div>
            </div>
            <div class="filter-row" id="chips"></div>
        </header>
        <main id="grid"></main>
    </div>

    <!-- REPORT OVERLAY -->
    <div id="ov" class="ov" onclick="this.style.display='none'">
        <div class="ov-box" id="ov-ct" onclick="event.stopPropagation()"></div>
    </div>

    <!-- CALENDAR MODAL -->
    <div id="cal-modal" class="cal-modal" onclick="this.classList.remove('show')">
        <div class="cal-box" onclick="event.stopPropagation()">
            <div class="cal-hdr">
                <h3>?뱟 ?곗씪由??앹닔 ?대엺</h3>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
                <div class="cal-nav">
                    <button onclick="calPrev()">??/button>
                    <div class="cal-nav"><div class="mon-lbl" id="cal-month-lbl"></div></div>
                    <button onclick="calNext()">??/button>
                </div>
                <select id="cal-site-sel" onchange="renderCal()" style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;font-weight:700;outline:none">

        <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                <div style="font-size:16px;font-weight:900;">?뵎 鍮꾨?踰덊샇 蹂寃?/div>
                <button class="cls-btn" onclick="document.getElementById('pw-modal').style.display='none'">?リ린</button>
            </div>
            <div style="margin-bottom:10px"><label for="pw-cur">?꾩옱 鍮꾨?踰덊샇</label><input type="password" id="pw-cur" style="width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;color:#fff;"></div>

            <div style="margin-bottom:16px"><label for="pw-confirm">??鍮꾨?踰덊샇 ?뺤씤</label><input type="password" id="pw-confirm" style="width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;color:#fff;"></div>
            <button onclick="submitPwChange()" style="width:100%;height:44px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:900;cursor:pointer;">蹂寃??꾨즺</button>
            <div id="pw-msg" style="text-align:center;font-size:12px;margin-top:10px;min-height:18px"></div>
        </div>
    </div>

    <!-- TREND MODAL -->
    <div id="trend-modal" class="trend-modal">
        <div class="trend-header">
            <div>
                <div style="font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent">?뱢 ?뺣? 遺꾩꽍 由ы룷??/div>
                <div style="font-size:11px;color:var(--dim);margin-top:3px" id="trend-date-range"></div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <select id="trend-region-sel" onchange="renderTrendReport()" style="background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;font-weight:700;outline:none;">
                    <option value="ALL">?꾩껜 吏??/option>

                <button class="cls-btn" onclick="closeTrend()">?リ린</button>

        <div class="trend-body" id="trend-body"></div>
        <div class="report-actions">
            <button id="export-btn" class="report-btn pri" onclick="exportReport()">?뱿 異붿텧</button>
            <button id="sync-btn" class="report-btn sec" onclick="refreshTrendFromGAS()">?뱻 ?숆린??/button>
            <button id="copy-btn" class="report-btn sec" onclick="copyReportText()">?뱥 蹂듭궗</button>
