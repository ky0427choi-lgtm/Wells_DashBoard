<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="mobile-web-app-capable" content="yes">
    <title>Samsung Welstory Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- ApexCharts -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.46.0/dist/apexcharts.min.js"></script>
    
    <!-- CSS: 로드 순서 변경 보장 -->
    <link rel="stylesheet" href="./assets/css/00-vars.css?v=20260520-06">
    <link rel="stylesheet" href="./assets/css/10-login.css?v=20260520-06">
    <link rel="stylesheet" href="./assets/css/20-layout.css?v=20260520-06">
    <link rel="stylesheet" href="./assets/css/30-card-table.css?v=20260520-06">
    <link rel="stylesheet" href="./assets/css/40-modal-calendar.css?v=20260520-06">
    <link rel="stylesheet" href="./assets/css/50-trend-report.css?v=20260521-01">
    <link rel="stylesheet" href="./assets/css/90-mobile-readability.css?v=20260521-02">
</head>

<body>
    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-bg"></div>
        <div class="login-card">
            <div class="login-logo">🏢</div>
            <h2>Welstory Dashboard</h2>
            <p>FSC1담당 사업장 운영현황 관리 시스템<br />인가된 관계자만 접근 가능합니다</p>
            <div class="login-field">
                <label for="loginId" style="display:none">아이디</label>
                <input type="text" id="loginId" placeholder="샘플 아이디" autocomplete="off">
                <div class="domain-tag">@samsung.com</div>
            </div>
            <div style="display:flex;align-items:center;justify-content:flex-end;margin:-4px 0 10px;gap:6px">
                <span id="save-id-label" style="font-size:11px;color:var(--dim);font-weight:600"></span>
                <button id="save-id-btn" onclick="toggleSaveId()"
                    style="padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;line-height:1.4">아이디 저장</button>
            </div>
            <label for="loginPw" style="display:none">비밀번호</label>
            <input type="password" id="loginPw" placeholder="비밀번호">
            <button class="login-btn" onclick="doLogin()">로그인</button>
            <div id="login-error"></div>
        </div>
    </div>

    <!-- SPLASH -->
    <div id="splash">
        <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:24px;letter-spacing:-.5px">Welstory Dashboard</div>
        <div class="sp-ring"></div>
        <div style="margin-top:20px;font-size:13px;color:var(--dim)">데이터를 불러오는 중..</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <header>
            <div class="header-top">
                <div>
                    <h1 id="main-title">Welstory 사업장운영현황</h1>
                    <div id="lastUpdate"></div>
                    <div id="role-badge"></div>
                </div>
                <div class="hdr-btns">
                    <button id="rpt-btn" class="hdr-btn accent" style="display:none" onclick="openReport()">📊 월간 리포트</button>
                    <button id="trend-btn" class="hdr-btn" onclick="openTrendReport()" title="추이 분석 리포트">📈 추이</button>
                    <button class="hdr-btn" onclick="openCal()" title="일간 통계 추가 입력">📅 일간</button>
                    <button class="hdr-btn" onclick="location.reload()">⟳</button>
                    <button class="hdr-btn" onclick="openPwChange()" title="비밀번호 변경">🔐</button>
                </div>
            </div>
            <div class="filter-row" id="chips"></div>
        </header>
        <main id="grid"></main>
    </div>

    <!-- REPORT OVERLAY -->
    <div id="ov" class="ov" onclick="this.style.display='none'">
        <div class="ov-box" id="ov-ct" onclick="event.stopPropagation()"></div>
    </div>

    <!-- CALENDAR MODAL -->
    <div id="cal-modal" class="cal-modal" onclick="this.classList.remove('show')">
        <div class="cal-box" onclick="event.stopPropagation()">
            <div class="cal-hdr">
                <h3>📅 일간 통계 추가 입력</h3>
                <button class="cls-btn" onclick="document.getElementById('cal-modal').classList.remove('show')">닫기</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
                <div class="cal-nav">
                    <button onclick="calPrev()">◀</button>
                    <div class="cal-nav"><div class="mon-lbl" id="cal-month-lbl"></div></div>
                    <button onclick="calNext()">▶</button>
                </div>
                <select id="cal-site-sel" onchange="renderCal()" style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;font-weight:700;outline:none">
                    <option value="ALL">전체 사업장</option>
                </select>
            </div>
            <div class="cal-grid" id="cal-days"></div>
            <div id="cal-detail"></div>
        </div>
    </div>

    <!-- PW CHANGE MODAL -->
    <div id="pw-modal" style="display:none;position:fixed;inset:0;background:rgba(10,15,30,.92);backdrop-filter:blur(16px);z-index:1800;justify-content:center;align-items:center;padding:16px" onclick="this.style.display='none'">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                <div style="font-size:16px;font-weight:900;">🔐 비밀번호 변경</div>
                <button class="cls-btn" onclick="document.getElementById('pw-modal').style.display='none'">닫기</button>
            </div>
            <div style="margin-bottom:10px"><label for="pw-cur">현재 비밀번호</label><input type="password" id="pw-cur" style="width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;color:#fff;"></div>
            <div style="margin-bottom:10px"><label for="pw-new">새 비밀번호</label><input type="password" id="pw-new" style="width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;color:#fff;"></div>
            <div style="margin-bottom:16px"><label for="pw-confirm">새 비밀번호 확인</label><input type="password" id="pw-confirm" style="width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:10px;color:#fff;"></div>
            <button onclick="submitPwChange()" style="width:100%;height:44px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:900;cursor:pointer;">변경 완료</button>
            <div id="pw-msg" style="text-align:center;font-size:12px;margin-top:10px;min-height:18px"></div>
        </div>
    </div>

    <!-- TREND MODAL -->
    <div id="trend-modal" class="trend-modal">
        <div class="trend-header">
            <div>
                <div style="font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent">📈 월간 추이 분석 리포트</div>
                <div style="font-size:11px;color:var(--dim);margin-top:3px" id="trend-date-range"></div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <select id="trend-region-sel" onchange="renderTrendReport()" style="background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;font-weight:700;outline:none;">
                    <option value="ALL">전체 지역</option>
                </select>
                <button class="cls-btn" onclick="closeTrend()">닫기</button>
            </div>
        </div>
        <div id="trend-tab-nav" style="display:flex;gap:6px;padding:0 20px;border-bottom:1px solid var(--border);background:rgba(10,15,30,.8);overflow-x:auto;">
            <button class="tr-tab active" data-tab="trend" onclick="switchTrendTab('trend')">📈 월간 추이 & 분석</button>
            <button class="tr-tab" data-tab="daily" onclick="switchTrendTab('daily')">📊 일일별 분석</button>
            <button class="tr-tab" data-tab="sites" onclick="switchTrendTab('sites')">🏪 사업장 비교</button>
            <button class="tr-tab" data-tab="report" onclick="switchTrendTab('report')">📝 정보 리포트</button>
        </div>
        <div class="trend-body" id="trend-body"></div>
        <div class="report-actions">
            <button id="export-btn" class="report-btn pri" onclick="exportReport()">📥 추출</button>
            <button id="sync-btn" class="report-btn sec" onclick="refreshTrendFromGAS()">🔄 새로고침</button>
            <button id="copy-btn" class="report-btn sec" onclick="copyReportText()">📋 복사</button>
            <button class="report-btn sec" onclick="closeTrend()">❌ 닫기</button>
        </div>
    </div>

    <!-- JS: 로드 순서 변경 보장 -->
    <script src="./assets/js/00-config.js?v=20260520-06"></script>
    <script src="./assets/js/01-utils.js?v=20260520-06"></script>
    <script src="./assets/js/02-auth-login.js?v=20260520-06"></script>
    <script src="./assets/js/03-data-load.js?v=20260520-06"></script>
    <script src="./assets/js/04-dashboard-render.js?v=20260521-01"></script>
    <script src="./assets/js/05-input-save.js?v=20260520-06"></script>
    <script src="./assets/js/06-report-modal.js?v=20260520-06"></script>
    <script src="./assets/js/07-calendar.js?v=20260520-06"></script>
    <script src="./assets/js/08-trend-report.js?v=20260521-02"></script>
    <script src="./assets/js/09-export-sync.js?v=20260520-06"></script>
    <script src="./assets/js/10-security.js?v=20260520-06"></script>
    <script src="./assets/js/99-bootstrap.js?v=20260520-06"></script>
</body>

</html>
